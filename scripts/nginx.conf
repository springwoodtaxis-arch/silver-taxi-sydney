##
## Silver Service Online — Nginx Configuration
## Place at: /etc/nginx/sites-available/silver-service
## Enable with: sudo ln -s /etc/nginx/sites-available/silver-service /etc/nginx/sites-enabled/
##

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name silverserviceonline.com.au www.silverserviceonline.com.au;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    server_name silverserviceonline.com.au www.silverserviceonline.com.au;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/silverserviceonline.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silverserviceonline.com.au/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # Static assets — serve directly from Nginx with long cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        root /var/www/silver-service-online/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri @proxy;
    }

    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        root /var/www/silver-service-online/public;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri @proxy;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|log|sh|json)$ {
        deny all;
        return 404;
    }

    # Allow access to package.json for health checks (optional — remove if not needed)
    location = /package.json {
        deny all;
        return 404;
    }

    # All other requests → Node.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limiting (optional — uncomment to enable)
        # limit_req zone=api burst=20 nodelay;
    }

    location @proxy {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logging
    access_log /var/log/nginx/silver-service-access.log;
    error_log  /var/log/nginx/silver-service-error.log;
}

name: Deploy to Hostinger on Push

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Hostinger Auto-Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy start
        run: echo "Deploying Silver Taxi Sydney to Hostinger..."

      - name: Trigger deploy webhook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST "https://silvertaxisydneyservice.com/api/deploy" \
            -H "x-deploy-token: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/master"}' \
            --max-time 30)
          BODY=$(cat /tmp/deploy_response.txt)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Deploy webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Deploy triggered successfully!"
